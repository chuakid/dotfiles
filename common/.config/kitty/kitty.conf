# vim:ft=kitty

# --- Theme ---
include current-theme.conf

# --- Shell ---
shell sh -c "if command -v fish >/dev/null 2>&1; then exec fish; else exec $SHELL; fi"

# --- Window ---
# Padding (WezTerm used left=5, others were mostly 0)
window_padding_width 0 5
background_opacity 0.98
inactive_text_alpha 0.8

# --- Tab Bar ---
# From WezTerm: tab_bar_at_bottom = true, use_fancy_tab_bar = false
tab_bar_edge bottom
tab_bar_style powerline
tab_bar_min_tabs 2 

# --- Cursor ---
cursor_shape block
cursor_blink_interval 1.0
cursor_trail 1

# --- Keybindings ---

# Splits
map ctrl+a>s launch --location=hsplit --cwd=current
map ctrl+a>v launch --location=vsplit --cwd=current
map ctrl+a>q close_pane
map ctrl+a>[ show_scrollback
map ctrl+a>w select_tab

# Alt + arrows to move between words (from WezTerm OPT+Left/Right)
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf

# --- Smart Splits Navigation/Resize ---
# Move
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

# Resize
map alt+left resize_window narrower
map alt+down resize_window shorter
map alt+up resize_window taller
map alt+right resize_window wider
