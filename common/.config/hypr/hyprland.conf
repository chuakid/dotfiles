
#########################################################################################
# HYPRLAND CONFIG - PORTED FROM NIRI
#########################################################################################

# --- Sources ---
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/dms/outputs.conf
source = ~/.config/hypr/dms/colors.conf
source = ~/.config/hypr/dms/layout.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/rules.conf
source = ~/.config/hypr/binds.conf

# --- Autostart ---
exec-once = kdeconnectd
exec-once = discord
exec-once = steam
exec-once = fcitx5 -d
exec-once = gnome-keyring-daemon --start --components=secrets,ssh,pkcs11

# --- Programs ---
$terminal = wezterm
$menu = dms ipc call spotlight toggle

# --- Environment Variables ---
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XMODIFIERS,@im=fcitx
env = SDL_IM_MODULE,fcitx
env = QT_IM_MODULES,"wayland;fcitx;ibus"

# --- Look and Feel ---
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgb(89b4fa)
    col.inactive_border = rgb(6c7086)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 1.0
    
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(00000070)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vrr = 2
}

# --- Input ---
input {
    kb_layout = us
    numlock_by_default = true
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

gestures {
    workspace_swipe = true
}
