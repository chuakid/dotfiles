# --- Keybindings ---
$mainMod = SUPER

# Application Launchers
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Space, exec, dms ipc call spotlight toggle
bind = $mainMod, V, exec, dms ipc call clipboard toggle
bind = $mainMod, M, exec, dms ipc call processlist focusOrToggle
bind = $mainMod, X, exec, dms ipc call powermenu toggle
bind = $mainMod, Comma, exec, dms ipc call settings focusOrToggle
bind = $mainMod, Y, exec, dms ipc call dankdash wallpaper
bind = $mainMod, N, exec, dms ipc call notifications toggle
bind = $mainMod SHIFT, N, exec, dms ipc call notepad toggle
bind = $mainMod ALT, L, exec, dms ipc call lock lock
bind = CTRL ALT, Delete, exec, dms ipc call processlist focusOrToggle

# Audio Controls
bindle = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 3
bindle = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 3
bindl = , XF86AudioMute, exec, dms ipc call audio mute
bindl = , XF86AudioMicMute, exec, dms ipc call audio micmute
bindl = , XF86AudioPause, exec, dms ipc call mpris playPause
bindl = , XF86AudioPlay, exec, dms ipc call mpris playPause
bindl = , XF86AudioPrev, exec, dms ipc call mpris previous
bindl = , XF86AudioNext, exec, dms ipc call mpris next
bindle = CTRL, XF86AudioRaiseVolume, exec, dms ipc call mpris increment 3
bindle = CTRL, XF86AudioLowerVolume, exec, dms ipc call mpris decrement 3

# Brightness Controls
bindle = , XF86MonBrightnessUp, exec, dms ipc call brightness increment 5 ""
bindle = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5 ""

# Window Management
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod SHIFT, T, togglefloating,
bind = $mainMod, W, togglegroup,
bind = $mainMod SHIFT, W, exec, dms ipc call window-rules toggle

# Focus Navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Window Movement
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Monitor Focus
bind = $mainMod CTRL, left, focusmonitor, l
bind = $mainMod CTRL, right, focusmonitor, r
bind = $mainMod CTRL, H, focusmonitor, l
bind = $mainMod CTRL, L, focusmonitor, r
bind = $mainMod CTRL, K, focusmonitor, u
bind = $mainMod CTRL, J, focusmonitor, d

# Move to Monitor
bind = $mainMod SHIFT, Tab, focusmonitor, next

# Workspace Management
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move to Numbered Workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = $mainMod SHIFT, S, exec, hyprshot -m region
bind = , Print, exec, hyprshot -m output
bind = CTRL, Print, exec, hyprshot -m output
bind = ALT, Print, exec, hyprshot -m window
